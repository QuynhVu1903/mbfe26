<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: grid;
            grid-template-areas:
                'header header header header header header'
                'menu main main main main right'
                'menu footer footer footer footer footer';
            background-color: dodgerblue;
            padding: 5px;
            gap: 5px;
            
        }
        .container div {
            background-color: aliceblue;
            text-align: center;
            padding: 5px;
            font-size: 30px;
            color: #000;
        }

        .item1 {
            grid-area: header;
        }

        .item2 {
            grid-area: menu;
        }

        .item3 {
            grid-area: main;
        }

        .item4 {
            grid-area: right;
        }

        .item5 {
            grid-area: footer;
        }
    </style>

</head>

<body>
    <h1>The grid-area Property</h1>
    <p>You can use he <i>grid-area</i> property to name grid items.</p>
    <p>This grid layout contains six columns and the three rows:</p>

    <div class="container">
        <div class="item1">Header</div>
        <div class="item2">Menu</div>
        <div class="item3">Main</div>
        <div class="item4">Right</div>
        <div class="item5">Footer</div>
    </div>
</body>

</html>
